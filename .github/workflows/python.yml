name: Python


on:
  push:
    branches: [main]
    paths:
      - '**.{rs,pyi,py}'
      - Cargo.lock
      - uv.lock
      - bindings/python/*.toml
      - '!bindings/node/**'
      - '!bindings/cpp/**'
      - .github/workflows/python.yml
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]
    paths:
      - '**.{rs,pyi,py}'
      - Cargo.lock
      - uv.lock
      - bindings/python/*.toml
      - '!bindings/node/**'
      - '!bindings/cpp/**'
      - .github/workflows/python.yml

permissions: {}

jobs:
  wheels:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-minor: ['10']
        platform:
          - runner: windows-latest
            target: x64
            py-arch: x64
          - runner: windows-latest
            target: x86
            py-arch: x86
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
          - runner: ubuntu-latest
            target: s390x
          - runner: ubuntu-latest
            target: ppc64le
        include:
          - python-minor: '11'
            platform:
              runner: windows-11-arm
              target: aarch64
              py-arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.${{ matrix.python-minor }}"
          architecture: ${{ matrix.platform.py-arch || null }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --out dist
            --interpreter 3.${{ matrix.python-minor }}
            --features "pyo3/abi3-py3${{ matrix.python-minor }}"
          working-directory: bindings/python
          sccache: ${{ startsWith(github.ref, 'refs/tags') && 'false' || 'true' }} # zizmor: ignore[cache-poisoning]
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ runner.os }}-${{ matrix.platform.target }}
          path: bindings/python/dist/*

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: bindings/python/dist/*

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this Repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        id: setup-uv
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning]
      - name: Cache deps
        uses: actions/cache@v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ~/.cargo
          key: python-test-${{ hashFiles('Cargo.lock', 'uv.lock') }}
      - name: Setup Rust
        run: rustup update --no-self-update
      - name: Install Workflow Dependencies
        run: uv sync --group py
      - name: Run pytest
        run: uv run pytest -v --color yes

  release:
    runs-on: ubuntu-latest
    needs: [wheels, sdist, test]
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/setup-python@v6
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          python-version: '3.x'
      - name: twine Check
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: pipx run twine check dist/*

      # now uses trusted publishing
      - name: Publish package PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
